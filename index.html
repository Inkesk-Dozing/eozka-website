<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCE Hub Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --brand: #A855F7;
            --brand-dim: #3B0764;
            --brand-glow: rgba(168, 85, 247, 0.2);
            --bg: #09090B;
            --text: #F4F4F5;
            --text-dim: #71717A;
            --border: rgba(168, 85, 247, 0.2);
            --ff-display: 'Cormorant Garamond', Georgia, serif;
            --ff-ui: 'Syne', sans-serif;
            --ff-mono: 'DM Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--ff-ui);
            overflow-x: hidden;
            cursor: none;
        }

        #cosmos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #FFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate3d(-50%, -50%, 0);
            transition: width .3s, height .3s;
            mix-blend-mode: difference;
        }

        #cursor-ring {
            position: fixed;
            width: 36px;
            height: 36px;
            border: 1px solid #FFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate3d(-50%, -50%, 0);
            transition: width .3s, height .3s, opacity .3s;
            mix-blend-mode: difference;
        }

        .portal-wrapper {
            width: 100%;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            padding: 40px 24px;
        }

        .moce-title {
            font-family: var(--ff-display);
            font-size: clamp(80px, 15vw, 180px);
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            animation: fadeIn 1s 0.2s both;
            opacity: 0;
        }

        .moce-subtitle {
            font-family: var(--ff-mono);
            font-size: 14px;
            letter-spacing: 0.3em;
            color: var(--brand);
            text-transform: uppercase;
            margin-bottom: 80px;
            animation: fadeIn 1s 0.6s both;
            opacity: 0;
            text-align: center;
        }

        .portal-grid {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 1s 0.9s both;
            opacity: 0;
        }

        .portal-card {
            width: 340px;
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 64px 40px;
            text-decoration: none;
            color: var(--text);
            position: relative;
            overflow: hidden;
            transition: transform 0.4s, border-color 0.4s, background 0.4s;
            cursor: none;
            text-align: center;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--brand-glow), transparent 40%);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 0;
            pointer-events: none;
        }

        .portal-card:hover {
            transform: translateY(-8px);
            border-color: var(--brand);
            background: rgba(24, 24, 27, 0.7);
        }

        .portal-card:hover::before {
            opacity: 1;
        }

        .portal-card>* {
            position: relative;
            z-index: 1;
        }

        .portal-card h2 {
            font-family: var(--ff-display);
            font-size: 40px;
            margin-bottom: 16px;
            color: #FFF;
        }

        .portal-card p {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {

            #cursor,
            #cursor-ring {
                display: none !important;
            }

            body,
            .portal-card {
                cursor: auto !important;
            }
        }
    </style>
</head>

<body>
    <canvas id="cosmos"></canvas>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="portal-wrapper">
        <h1 class="moce-title">MOCE</h1>
        <p class="moce-subtitle">The Parent Infrastructure</p>

        <div class="portal-grid">
            <a href="eozka/index.html" class="portal-card">
                <h2>eOzka</h2>
                <p>The founding subsidiary. A framework for augmenting sentient systems.</p>
            </a>
            <a href="mock/index.html" class="portal-card">
                <h2>MOCK</h2>
                <p>The secondary structural domain. Currently in research phase.</p>
            </a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const cursorRing = document.getElementById('cursor-ring');
        let mx = -100, my = -100, rx = -100, ry = -100;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            if (cursor) cursor.style.transform = `translate3d(${mx}px, ${my}px, 0) translate3d(-50%, -50%, 0)`;
            document.querySelectorAll('.portal-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });
        function animateCursor() {
            rx += (mx - rx) * .12; ry += (my - ry) * .12;
            if (cursorRing) cursorRing.style.transform = `translate3d(${rx}px, ${ry}px, 0) translate3d(-50%, -50%, 0)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
        document.querySelectorAll('a').forEach(el => {
            el.addEventListener('mouseenter', () => {
                if (cursor) { cursor.style.width = '14px'; cursor.style.height = '14px'; }
                if (cursorRing) { cursorRing.style.width = '54px'; cursorRing.style.height = '54px'; cursorRing.style.opacity = '0.4'; }
            });
            el.addEventListener('mouseleave', () => {
                if (cursor) { cursor.style.width = '8px'; cursor.style.height = '8px'; }
                if (cursorRing) { cursorRing.style.width = '36px'; cursorRing.style.height = '36px'; cursorRing.style.opacity = '1'; }
            });
        });

        const canvas = document.getElementById('cosmos');
        const ctx = canvas.getContext('2d');
        let W, H, particles, animId;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        function initParticles() {
            const count = Math.min(Math.floor(W * H / 12000), 100);
            particles = Array.from({ length: count }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                vx: (Math.random() - .5) * .4, vy: (Math.random() - .5) * .4,
                r: Math.random() * 1.5 + .5, o: Math.random() * .5 + .2
            }));
        }
        function drawFrame() {
            ctx.clearRect(0, 0, W, H);
            const maxDist = 130;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    if (d < maxDist) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(168,85,247,${(1 - d / maxDist) * .15})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            for (const p of particles) {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
                ctx.fillStyle = `rgba(168,85,247,${p.o})`; ctx.fill();
            }
            animId = requestAnimationFrame(drawFrame);
        }
        window.addEventListener('resize', () => { cancelAnimationFrame(animId); resize(); initParticles(); drawFrame(); });
        resize(); initParticles(); drawFrame();
    </script>
</body>

</html>
